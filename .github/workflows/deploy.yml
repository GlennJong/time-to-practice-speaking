name: Deploy Production

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate version metadata
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DEPLOY_ENV="production"
          VERSION_LABEL="${APP_VERSION}-${DEPLOY_ENV}.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"

          echo "VITE_APP_ENV=${DEPLOY_ENV}" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=${VERSION_LABEL}" >> "$GITHUB_ENV"
          echo "VITE_APP_COMMIT=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "VITE_APP_BUILD_TIME=${BUILD_TIME}" >> "$GITHUB_ENV"

          cat > version.json <<EOF
          {
            "env": "${DEPLOY_ENV}",
            "version": "${VERSION_LABEL}",
            "packageVersion": "${APP_VERSION}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "commit": "${SHORT_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "buildTime": "${BUILD_TIME}"
          }
          EOF

      - name: Build
        run: npm run build:prod
        env:
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL_PROD }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Attach version file
        run: cp version.json dist/version.json
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dist
          keep_files: true